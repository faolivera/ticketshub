// =============================================================================
// PROD (base) - All env vars used by the app are listed below as ${?VAR}.
// Set them in your environment or in an optional .env file in backend/ (the
// config loader loads .env before parsing so ${?VAR} resolve). Not versioned.
// =============================================================================

app {
  // Set by loader from ENVIRONMENT (dev | test | staging | prod)
  environment = "prod"
  isProduction = true
  // Public origin for canonical URLs and OG image (e.g. https://ticketshub.com.ar)
  publicUrl = ${?APP_PUBLIC_URL}
  // Backend origin used for webhook notification_url (e.g. https://api.ticketshub.com.ar)
  backendUrl = ${?APP_BACKEND_URL}
  // Path to frontend build (index.html + assets). In Docker: /app/backend/public
  clientBuildPath = ${?APP_CLIENT_BUILD_PATH}
}

// Global default level; overrides per logger name in "levels".
// Order: verbose < debug < log < warn < error < fatal (cascading).
logging {
  level = "info"
  levels = {}
}

database {
  url = ${?DATABASE_URL}
}

jwt {
  secret = ${?JWT_SECRET}
  expiresIn = ${?JWT_EXPIRES_IN}
}

google {
  clientId = ${?GOOGLE_CLIENT_ID}
}

storage {
  region = ${?AWS_REGION}
  accessKeyId = ${?AWS_ACCESS_KEY_ID}
  secretAccessKey = ${?AWS_SECRET_ACCESS_KEY}
  endpoint = ${?S3_ENDPOINT}
  signedUrlEndpoint = ${?S3_SIGNED_URL_ENDPOINT}
  cloudfrontBaseUrl = ${?CLOUDFRONT_BASE_URL}
  privateBucket = ${?S3_PRIVATE_BUCKET}
  publicBucket = ${?S3_PUBLIC_BUCKET}
}

// Scheduler batch limits (env: TRANSACTIONS_SCHEDULER_BATCH_LIMIT)
scheduler {
  transactionBatchLimit = 100
  transactionBatchLimit = ${?TRANSACTIONS_SCHEDULER_BATCH_LIMIT}
}

// Event ranking: optional weight per city (multiplier applied to base score). Not in admin UI yet.
eventScoring {
  cityWeights = {}
}

platform {
  buyerPlatformFeePercentage = 10
  sellerPlatformFeePercentage = 5
  paymentTimeoutMinutes = 10
  adminReviewTimeoutHours = 24
  offerPendingExpirationMinutes = 1440
  offerAcceptedExpirationMinutes = 1440
  transactionChatPollIntervalSeconds = 15
  transactionChatMaxMessages = 100
  riskEngine {
    buyer {
      phoneRequiredEventHours = 72
      phoneRequiredAmountUsd = 120
      phoneRequiredQtyTickets = 2
      newAccountDays = 7
      phoneRequiredPaymentMethodTypes = ["manual_approval"]
      dniRequiredEventHours = 24
      dniRequiredAmountUsd = 250
      dniRequiredQtyTickets = 4
      dniNewAccountDays = 3
      dniRequiredPaymentMethodTypes = []
    }
    seller {
      unverifiedSellerMaxSales = 2
      unverifiedSellerMaxAmountUsd = 200
      payoutHoldHoursDefault = 24
      payoutHoldHoursUnverified = 48
    }
    claims {
      ticketNotReceived {
        minimumClaimHours = 1
        maximumClaimHours = 56
      }
      ticketDidntWork {
        minimumClaimHours = 0
        maximumClaimHours = 5
      }
    }
  }
  exchangeRates {
    usdToArs = 1000
  }
}


// Resend (email). Use when otp.emailProvider or notifications.emailProvider = "RESEND".
resend {
  apiKey = ${?RESEND_API_KEY}
  fromEmail = ${?RESEND_FROM_EMAIL}
}

# // Twilio Verify API for SMS OTP (TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_VERIFY_SERVICE_SID).
twilio {
  accountSid = ${?TWILIO_ACCOUNT_SID}
  authToken = ${?TWILIO_AUTH_TOKEN}
  verifyServiceSid = ${?TWILIO_VERIFY_SERVICE_SID}
}

otp {
  expirationMinutes = 10
  maxAttempts = 5
  emailProvider = "RESEND"
  smsProvider = "TWILIO"
}

notifications {
  emailProvider = "RESEND"
  retry {
    maxRetries = 3
    backoffMinutes = [1, 5, 15]
  }
  retentionDays = 30
}

users {
  allowedAvatarMimeTypes = ["image/jpeg", "image/png", "image/webp", "image/gif"]
  maxAvatarSizeBytes = 5242880
}