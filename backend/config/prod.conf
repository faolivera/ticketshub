// =============================================================================
// PROD (base) - All env vars used by the app are listed below as ${?VAR}.
// Set them in your environment or in an optional .env file in backend/ (the
// config loader loads .env before parsing so ${?VAR} resolve). Not versioned.
// =============================================================================

app {
  // Set by loader from ENVIRONMENT (dev | test | staging | prod)
  environment = "prod"
  isProduction = true
}

// Global default level; overrides per logger name in "levels".
// Order: verbose < debug < log < warn < error < fatal (cascading).
logging {
  level = "info"
  levels = {}
}

database {
  url = ${?DATABASE_URL}
}

jwt {
  secret = ${?JWT_SECRET}
  expiresIn = ${?JWT_EXPIRES_IN}
}

storage {
  region = ${?AWS_REGION}
  accessKeyId = ${?AWS_ACCESS_KEY_ID}
  secretAccessKey = ${?AWS_SECRET_ACCESS_KEY}
  endpoint = ${?S3_ENDPOINT}
  privateBucket = ${?S3_PRIVATE_BUCKET}
  publicBucket = ${?S3_PUBLIC_BUCKET}
}

platform {
  digitalNonTransferableReleaseMinutes = 30
  buyerPlatformFeePercentage = 10
  sellerPlatformFeePercentage = 5
  defaultCurrency = "EUR"
  maxListingDurationDays = 90
  paymentTimeoutMinutes = 10
  adminReviewTimeoutHours = 24
}

otp {
  codeLength = 6
  expirationMinutes = 10
  maxAttempts = 5
}

notifications {
  retry {
    maxRetries = 3
    backoffMinutes = [1, 5, 15]
  }
  retentionDays = 30
}

users {
  allowedAvatarMimeTypes = ["image/jpeg", "image/png", "image/webp", "image/gif"]
  maxAvatarSizeBytes = 5242880
}

// Payment gateway credentials: each method uses env vars like {PREFIX}_ACCESS_TOKEN,
// {PREFIX}_PUBLIC_KEY (mercadopago), {PREFIX}_AUTH_TOKEN (uala_bis), etc.
// The loader injects process.env under "env" so the app can read any key without
// touching process.env. Document your gateway vars here as reference:
// e.g. MERCADOPAGO_MAIN_ACCESS_TOKEN, MERCADOPAGO_MAIN_PUBLIC_KEY
