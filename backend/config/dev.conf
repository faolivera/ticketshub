include "prod.conf"

app {
  environment = "dev"
  // In dev, point to frontend source so backend can read index.html with placeholders
  publicUrl = "http://localhost:5173"
  // Backend origin used for webhook notification_url. Override with APP_BACKEND_URL when using ngrok.
  backendUrl = "http://localhost:3000"
  backendUrl = ${?APP_BACKEND_URL}
  // Default: repo layout with backend/ and frontend/ siblings; override with APP_CLIENT_BUILD_PATH
  clientBuildPath = ${?APP_CLIENT_BUILD_PATH}
}

logging {
  level = "info"
  levels {
    DistributedLockService = "info"
    PrismaService = "info"
  }
}

database {
  url = ${?DATABASE_URL}
}

jwt {
  secret = "dev-secret-change-in-production"
  expiresIn = "7d"
  secret = ${?JWT_SECRET}
  expiresIn = ${?JWT_EXPIRES_IN}
}

google {
  clientId = ${?GOOGLE_CLIENT_ID}
}

storage {
  region = "us-east-1"
  accessKeyId = "test"
  secretAccessKey = "test"
  endpoint = "http://localhost:4567"
  privateBucket = "ticketshub-private-dev"
  publicBucket = "ticketshub-public-dev"
  // cloudfrontBaseUrl = ${?CLOUDFRONT_BASE_URL}  // Uncomment to test against a real CloudFront distribution
}

// Resend (email). Use when otp.emailProvider or notifications.emailProvider = "RESEND"
resend {
  apiKey = ${?RESEND_API_KEY}
  fromEmail = ${?RESEND_FROM_EMAIL}
}

otp {
  emailProvider = "MOCK_EMAIL"
  smsProvider = "MOCK_SMS"
}

twilio {
  accountSid = ${?TWILIO_ACCOUNT_SID}
  authToken = ${?TWILIO_AUTH_TOKEN}
  verifyServiceSid = ${?TWILIO_VERIFY_SERVICE_SID}
}

notifications {
  emailProvider = "MOCK_EMAIL"
}

// Event ranking: weight per city (dev example; override as needed).
eventScoring {
  cityWeights = {
    "Buenos Aires" = 1.5
    "Córdoba" = 1.2
  }
}
