# Build TicketsHub Docker image for AWS Lightsail (linux/amd64), push to GHCR, and deploy.
# TLS/SSL for ticketshub.shop, ticketshub.com.ar, ticketshub.ar via Caddy in the image.
# Trigger: manual only (workflow_dispatch).
#
# Required secrets:
#   LIGHTSAIL_HOST       Public IP of the Lightsail instance.
#   LIGHTSAIL_USER       SSH user (e.g. ubuntu).
#   LIGHTSAIL_SSH_KEY    Private key (PEM) for SSH access.
#
# If push fails with "permission_denied: write_package":
# - Repo in org: Settings → Actions → General → Workflow permissions → "Read and write permissions".
# - Or add a PAT with write:packages as repo secret GHCR_TOKEN (used below when set).
#
# The deploy script (release/lightsail/deploy-on-server.sh) must exist on the server at
# ~/ticketshub/release/lightsail/ and ~/ticketshub.env must contain the app secrets.
name: Docker image – Lightsail (linux/amd64)

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - build-only
          - deploy-only

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ticketshub-lightsail

jobs:
  build:
    if: inputs.job == 'all' || inputs.job == 'build-only'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Prepare backend (for build.sh)
        run: |
          cd backend
          pnpm install --frozen-lockfile
          pnpm exec prisma generate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build image (release/lightsail/build.sh)
        env:
          BUILD_PLATFORM: linux/amd64
          REGISTRY_CACHE_REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:buildcache
        run: |
          chmod +x release/lightsail/build.sh
          ./release/lightsail/build.sh "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"

      - name: Push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          docker push "${IMAGE}:latest"
          docker tag "${IMAGE}:latest" "${IMAGE}:sha-${{ github.sha }}"
          docker push "${IMAGE}:sha-${{ github.sha }}"

  deploy:
    needs: build
    if: always() && (inputs.job == 'all' || inputs.job == 'deploy-only') && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy release files to server
        run: |
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -az --mkpath \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            release/lightsail \
            ${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}:~/ticketshub/release/
          rm /tmp/deploy_key

      - name: Deploy to Lightsail via SSH
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          REMOTE_USER: ${{ secrets.LIGHTSAIL_USER }}
          REMOTE_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "$REMOTE_USER@$REMOTE_HOST" \
            "set -e
             if ! docker compose version &>/dev/null; then
               sudo mkdir -p /usr/local/lib/docker/cli-plugins
               sudo curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
               sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
             fi
             chmod +x ~/ticketshub/release/lightsail/deploy-on-server.sh
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$REPO_OWNER' --password-stdin
             cd ~/ticketshub/release/lightsail
             ENV_FILE=~/ticketshub.env ./deploy-on-server.sh '$REPO_OWNER'"  --with-grafana-agent
          rm /tmp/deploy_key
