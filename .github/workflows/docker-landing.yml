# Build landing Docker image for linux/amd64 (e.g. Lightsail) and push to GHCR.
# Trigger: manual only (workflow_dispatch).
#
# If push fails with "permission_denied: write_package":
# - Repo in org: Settings → Actions → General → Workflow permissions → "Read and write permissions".
# - Or add a PAT with write:packages as repo secret GHCR_TOKEN (used below when set).
name: Docker image – Landing (linux/amd64)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build landing image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ticketshub-landing"
          CACHE_REF="${IMAGE}:buildcache"
          docker buildx build --platform linux/amd64 \
            --cache-from "type=registry,ref=${CACHE_REF}" \
            --cache-to "type=registry,ref=${CACHE_REF},mode=max" \
            -f landing/Dockerfile \
            -t "${IMAGE}:latest" \
            --load \
            landing
          docker tag "${IMAGE}:latest" "${IMAGE}:sha-${{ github.sha }}"

      - name: Push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ticketshub-landing"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:sha-${{ github.sha }}"
          echo "Pushed ${IMAGE}:latest and ${IMAGE}:sha-${{ github.sha }}"
