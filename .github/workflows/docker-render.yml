# Build TicketsHub Docker image for linux/amd64 (e.g. Render) and push to GHCR.
# Trigger: manual only (workflow_dispatch).
#
# If push fails with "permission_denied: write_package":
# - Repo in org: Settings → Actions → General → Workflow permissions → "Read and write permissions".
# - Or add a PAT with write:packages as repo secret GHCR_TOKEN (used below when set).
name: Docker image – Render (linux/amd64)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Prepare backend (for build.sh)
        run: |
          cd backend
          npm ci
          npx prisma generate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build image (release/render/build.sh)
        env:
          BUILD_PLATFORM: linux/amd64
          REGISTRY_CACHE_REF: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ticketshub:buildcache
        run: |
          chmod +x release/render/build.sh
          ./release/render/build.sh "${{ env.REGISTRY }}/${{ github.repository_owner }}/ticketshub:latest"

      - name: Push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ticketshub"
          docker push "${IMAGE}:latest"
          docker tag "${IMAGE}:latest" "${IMAGE}:sha-${{ github.sha }}"
          docker push "${IMAGE}:sha-${{ github.sha }}"
